<!DOCTYPE html>
<html>

<head>
    <title>Fabric.js Arrow Debug</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <style>
        body {
            background: #1a1a2e;
            padding: 20px;
            color: white;
        }

        canvas {
            border: 1px solid red;
        }
    </style>
</head>

<body>
    <h1>Arrow Debug (Fabric v5) & v7 Logic Check</h1>
    <canvas id="c" width="600" height="400"></canvas>
    <script>
        const canvas = new fabric.Canvas('c');

        function drawArrow(x1, y1, x2, y2) {
            console.log('Drawing arrow from', x1, y1, 'to', x2, y2);

            const line = new fabric.Line([x1, y1, x2, y2], {
                stroke: '#e94560',
                strokeWidth: 3,
                padding: 5
            });

            const angle = Math.atan2(y2 - y1, x2 - x1);
            const headLength = 15;

            // Calculate absolute points for arrowhead
            const headPoints = [
                { x: x2, y: y2 },
                { x: x2 - headLength * Math.cos(angle - Math.PI / 6), y: y2 - headLength * Math.sin(angle - Math.PI / 6) },
                { x: x2 - headLength * Math.cos(angle + Math.PI / 6), y: y2 - headLength * Math.sin(angle + Math.PI / 6) },
            ];

            console.log('Head points:', headPoints);

            const arrowHead = new fabric.Polygon(headPoints, {
                fill: '#e94560',
                stroke: '#e94560',
                strokeWidth: 1,
                originX: 'center',
                originY: 'center'
            });

            // PROBLEM: When creating a path/polygon with points, Fabric often recenters it
            // Let's try to just add them separately first
            // canvas.add(line, arrowHead);

            // Now try grouping
            const group = new fabric.Group([line, arrowHead], {
                selectable: true
            });

            canvas.add(group);
        }

        drawArrow(50, 50, 250, 50);   // Horizontal
        drawArrow(50, 100, 250, 200); // Diagonal

    </script>
</body>

</html>
